services:
  backend:
    build:
      context: .
      dockerfile: app/backend/Dockerfile
    environment:
      APP_TITLE: Text to Speech WebUI
      OFFLINE_MODE: "true"
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      HF_DATASETS_OFFLINE: "1"
      NO_TELEMETRY: "1"
      DEMO_MODE: "false"
      ENABLE_QWEN: "true"
      QWEN_ENABLED_IN_UI: "true"
      MODEL_ROOT: /workspace/runtime/models
      OUTPUT_ROOT: /workspace/runtime/output
      JOBS_ROOT: /workspace/runtime/data/jobs
      VOICE_SAMPLES_ROOT: /workspace/runtime/data/voices
      LOGS_ROOT: /workspace/runtime/logs
    expose:
      - "8000"
    volumes:
      - ./runtime/models:/workspace/runtime/models
      - ./runtime/output:/workspace/runtime/output
      - ./runtime/data/jobs:/workspace/runtime/data/jobs
      - ./runtime/data/voices:/workspace/runtime/data/voices
      - ./runtime/logs:/workspace/runtime/logs
    networks:
      - webapp

  frontend:
    build:
      context: .
      dockerfile: app/frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - webapp

networks:
  webapp:
    driver: bridge
